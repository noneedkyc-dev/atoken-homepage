<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AToken — Agent-Driven Perp</title>
  <meta name="description" content="AToken Agent-Driven Perp landing page package." />
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="preload" as="image" href="./assets/homepage-final.png">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="artboard">
        <img src="./assets/homepage-final.png" alt="AToken homepage" class="hero-image" />

        <!-- top actions -->
        <a class="hotspot launch-top" href="https://dex.atoken.xyz" target="_blank" rel="noopener noreferrer" aria-label="Launch APP"></a>

        <!-- main CTA -->
        <a class="hotspot launch-main" href="https://dex.atoken.xyz" target="_blank" rel="noopener noreferrer" aria-label="Launch APP"></a>
        <a class="hotspot explore-markets" href="https://dex.atoken.xyz" target="_blank" rel="noopener noreferrer" aria-label="Explore Markets"></a>

        <!-- social buttons -->
        <a class="hotspot telegram" href="https://t.me/atokenxyz" target="_blank" rel="noopener noreferrer" aria-label="Telegram"></a>
        <a class="hotspot twitter" href="https://x.com/ATokenxyz" target="_blank" rel="noopener noreferrer" aria-label="Twitter / X"></a>
        <a class="hotspot discord" href="javascript:void(0)" aria-label="Discord placeholder"></a>
        <button class="hotspot wechat" type="button" aria-label="WeChat QR"></button>
      </div>
    </section>
  </main>

  <div class="qr-modal" id="qrModal" aria-hidden="true">
    <div class="qr-backdrop" data-close></div>
    <div class="qr-dialog" role="dialog" aria-modal="true" aria-labelledby="qrTitle">
      <button class="qr-close" type="button" data-close aria-label="Close">×</button>
      <h2 id="qrTitle">WeChat Assistant</h2>
      <img src="./assets/wechatqr.png" alt="WeChat QR placeholder" class="qr-image" />
    </div>
  </div>

  <script src="./js/main.js"></script>
</body>
</html>
