<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AToken — High Fidelity Landing Recreation</title>
  <meta name="description" content="High-fidelity recreation of the AToken landing hero with live Binance market ticker." />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="hero-page">
    <section class="hero" aria-label="AToken landing page hero">
      <img class="hero-reference" src="./assets/hero-reference.png" alt="AToken reference hero artwork" />

      <a class="hotspot hotspot-logo" href="/" aria-label="AToken Home"></a>
      <a class="hotspot hotspot-launch-top" href="https://dex.atoken.xyz" target="_blank" rel="noreferrer" aria-label="Launch APP"></a>
      <a class="hotspot hotspot-launch-main" href="https://dex.atoken.xyz" target="_blank" rel="noreferrer" aria-label="Launch APP button"></a>
      <a class="hotspot hotspot-explore-markets" href="https://dex.atoken.xyz/markets" target="_blank" rel="noreferrer" aria-label="Explore Markets button"></a>
      <a class="hotspot hotspot-telegram" href="https://t.me/atokenxyz" target="_blank" rel="noreferrer" aria-label="Telegram"></a>
      <a class="hotspot hotspot-x" href="https://x.com/ATokenxyz" target="_blank" rel="noreferrer" aria-label="X"></a>
      <button class="hotspot hotspot-discord" type="button" aria-label="Discord"></button>
      <button class="hotspot hotspot-wechat" type="button" aria-label="Wechat QR Code"></button>

      <div class="live-ticker-shell" aria-label="Live Binance market ticker">
        <div class="live-ticker-track" id="tickerTrack"></div>
      </div>

      <div class="status-chip" id="wsStatus">Connecting live Binance market feed…</div>
    </section>
  </main>

  <div class="wechat-modal" id="wechatModal" aria-hidden="true" role="dialog" aria-labelledby="wechatTitle">
    <div class="wechat-card">
      <button class="wechat-close" id="wechatClose" aria-label="Close WeChat QR">×</button>
      <h2 id="wechatTitle">AToken WeChat</h2>
      <p>Scan to connect on WeChat.</p>
      <img src="./assets/wechatqr.png" alt="AToken WeChat QR code" />
      <small>Replace <code>assets/wechatqr.png</code> with your official QR code when ready.</small>
    </div>
  </div>

  <div class="discord-toast" id="discordToast" aria-hidden="true">Discord link not provided yet. Update it in <code>index.html</code> when ready.</div>

  <script src="./js/app.js"></script>
</body>
</html>
